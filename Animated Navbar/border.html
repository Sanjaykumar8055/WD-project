<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
            color: wheat;
            font-size: 50px;
        }
        body{
            background-color: black;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .box{
            height: 500px;
            width: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* box-shadow: 0px 0px 25px white; */
            overflow: hidden;
            position: relative;
        }
        .box::before{
            content: "";
            position: absolute;
            height: 140%;
            width:250px;
            background: linear-gradient( to right,rgb(91, 244, 3),rgb(3, 252, 173));
            animation: border 5s linear infinite;
            z-index: -1;
        }
        @keyframes border {
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }
        .box::after{
            content: "";
            position: absolute;
            background-color: rgb(3, 2, 2);
            inset: 5px;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="box">
        Sanju
    </div>
</body>
</html>
